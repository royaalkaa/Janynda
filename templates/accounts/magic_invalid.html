{% extends "base/base.html" %}

{% block title %}Ссылка недействительна · Janynda{% endblock %}

{% block layout %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="j-onboarding-card text-center">
                <div class="display-5 text-danger mb-3"><i class="bi bi-link-45deg"></i></div>
                <h1 class="h3 mb-2">Ссылка больше не работает</h1>
                <p class="text-muted mb-4">
                    Magic link просрочен или был отключён. Попросите родственника отправить новую ссылку.
                </p>
                <a href="{% url 'login' %}" class="btn btn-outline-primary">Открыть обычный вход</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
